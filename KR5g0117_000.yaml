body:
  text: 海瓊白玉蟾作龍虎賦竒哉九轉金液七返大還丹誠神氣之陀羅兮性命之衆甫擎阿耨之元兮職達摩之華勛身砂而心汞兮出日而入月青龍白虎朱雀兮熒惑居癸而漭渺位丙絳宫天子兮御黄庭之奥壺慈兮悲兮威惠而武文天一坎地二離兮乾坤互南北眞鉛先天之氣兮可爲七十二石之冠剛弱中外而雌雄條理兮金火含受金水之事初九未神變兮天心抱陽和木汞生東辰之體兮金精長西戌之胚巽畢復而乾畢剥兮春秋而仁義冬夏而界度亶婁上下釜兮砂汞所配感之神室張虛危翼兮金不綻而土不輕潜藏飛躍兮徃來上下無爻位而歸乎太極兮以包囊衆石有無隱顯兮水金爲丹本日精滅坎離兮浮沉而消息金公索坎實兮姹女叩離虛金戮木兮而水殄火黄帝堅旗於金郷兮金木火化爲明窗塵混沌之金火兮寳精終一九一斤十六兩兮三百八十有四銖震爻膺陽籙兮水翠玄而金赭黄山河大地以凝虛兮精液混丹砂而融眞墨鉛變素朱汞瑩碧兮金華蒙鴻而洞虛水一火二而土五兮濡英金而飛精水天地至精兮以戊己運天符十二斗樞而十二鍾律兮流汞日之魂黄金月之魄玄圖未漸剥兮陽精爲畢方之父坤變震於初而變兊於再兮日月既合璧而上弦平如繩三五三陽既圓兮圓眀現東甲蟾蜍視卦節兮兔魄吐生光乾初變於巽而再變於艮兮月明辛而現丙周回五六而東北喪朋於乙地兮土與木金和爲液而復象禪雷辰神室兮中五運而外八卦隂符陽火兮陸旬化雞子而五嶽峙潜樞頂乾金而踵坤水兮隂陽禀自然而中和流素津靈户黑鉛鍊眞土兮泉窟白金生水銀亥末陽動而曦馭行南陸兮五星連珠而金砂呼吸日月之遲速紫微十六華蓋星兮三台攝調爕之星以責統録日火合五行之精兮鍊中宫之土月金受六律之紀兮入北方之水火是藥之父母兮藥是火之子孫水土金兮六十日先後存亡金汞抵角兮鼎室抗衡土母召四方之和兮乾動應三光金火精氣而光耀一室兮何水涸而火殞龍虎之氣相交兮金木之情契合情性交結兮温養子珠水者玄華而土者金母兮丹室結流珠而黄黑混水土之元精紫華敷腴而黄液蕩漾兮神藥未遂金生水鍊鉛爲白金兮白金爲神室神室有金水兮火色變凝而黄舉水火凝中府兮金液不飛火灼金華兮輕煙薄霧以寂白金爲有而火氣爲無兮鍊汞兆神兩虛無兮水火抱粹而日月懷沖黑鉛兮金精玄水而包坎汞黄芽現白蘂兮紅苞金爲水母兮華池泛眞素壇爐竈有神室而委曲關隄金土合汞兮自然而神化矣烏兔經猗夫金液大還丹之妙堪輿琴厥沖寥沈骨其虛晨霄旋昴左暮壤轉酉右日宫躍兔月府翔烏姹女騎赤龍金公踞黑虎砂孕汞鉛緘銀四象鈴其極五運宰乎土黄婆衣緋霓丁翁服青霞黑白分玄牝華池發玉醴赤子産玄珠紅爐烹剛金蒼龜其足赤白蜦其背黑玉蕤秀神谷金粟萌丹田鉢特摩花開提婆雲葉落南箕招摇坎北杓玄紀離天局日月復熒惑建六虛風輪水火姤漭蕩胎三畫二三乳哺備五六周九九蝗飛夏雪草茂冬炎陽剛武城池隂柔文珠珍兔雞浴蘭芷蟾曦化戈矛偃月爐天罡朱砂鼎崑崙乾元乾屯蒙坤用坤否泰嫦娥配羅㬋陽黎妻月孛清濁泥中辨浮沉火内尋主賔相刑德生尅互恩害二八兩重弦二七九之乾殺機殺乎艮鑽研隸乎震太一胎戊己萬物皆風月鐵錫銅鍮鑛化生紫芙蕖或問芙蕖中靈馨熏煙衢元始天尊霜太上老君櫻已矣夫玄關顯祕論一言半句便通玄何用丹書千萬篇人若不爲形所累眼前便是大羅天若要鍊形鍊神須識歸根復命所以道歸根自有歸根竅復命還尋復命關且如這箇關竅若人知得眞實處則歸根復命何難也故曰有人要識神仙訣只去搜尋造化根古者虛無生自然自然生大道大道生一氣一氣分隂陽隂陽爲天地天地生萬物則是造化之根也此乃眞一之氣萬象之先太虛太無太空太玄杳杳㝠㝠非尺寸之所可量浩浩蕩蕩非涯岸之所可測其大無外其小無内大包天地小入毫芒上無復色下無復淵一物圓明千古顯客不可得而名者聖人以心契之不獲已而名之曰道以是知即心是道也故無心則與道合有心則與道違惟此無之一字包諸有而無餘生萬物而不竭天地雖大能役有形不能役無形隂陽雖妙能役有氣不能役無氣五行至精能役有數不能役無數百念紛起能役有識不能役無識今夫修此理者不若先鍊形鍊形之妙在乎凝神神凝則氣聚氣聚則丹成丹成則形固形固則神全故宋齊丘云忘形以養氣忘氣以養神忘神以養虛只此忘之一字則是無物也本來無一物何處有塵埃其斯之謂乎如能味此理就於忘之一字上做工夫可以入大道之淵微奪自然之妙用立丹基於頃刻運造化於一身也然此道視之寂寥而無所覩聽之杳冥而無所聞惟以心視之則有象以心聽之則有聲若學道之士㝠心凝神致虛守靜則虛室生白信乎自然也惟太上度人教人修鍊以乾坤爲鼎器以烏兔爲藥物以日魂之升沉應氣血之升降以月魄之虧盈應精神之衰旺以四季之節候應一日之時刻以週天之星數應一爐之造化是故採精神以爲藥取靜定以爲火以靜定之火而鍊精神之藥則成金液大還丹蓋眞隂眞陽之交會一水一火之配合要在先辨浮沉次明主客審抽添之運用察反覆之安危如高象先云採有日取有時劉海蟾云開闔乾坤造化權煆鍊一爐眞日月能悟之者效日月之運用與天地以同功夫豈知天養無象地養無體故天長地天日光月明眞一長存虛空不朽也吾今則而象之無事於心無心於事内觀其心心無其心外觀其形形無其形遠觀其物物無其物知心無心知形無形知物無物超出萬幻確然一靈古經云生我於虛置我於無是宜歸性根之太始反未生之已前藏心於心而不見藏神於神而不出故能三際圓通萬縁澄寂六根清凈方寸虛明不滯於空不滯於無空諸所空無諸所無至於空無所空無無所無淨躶躶赤洒洒地則靈然而獨存者也道非欲虛虛自歸之人能虛心道自歸之道本無名近不可取遠不可捨非方非圓非内非外惟聖人知之三毒無根六慾無種頓悟此理歸於虛無老君曰天地之間其猶橐籥乎虛而不屈動而愈出若能於靜定之中抱沖和之氣守眞一之精則是封爐固濟以行火候也火本南方離卦離屬心心者神也神則火也氣則藥也以火鍊藥而成丹者即是以神御氣而成道也人能手搏日月心握鴻濛自然見橐籥之開闢河車之升降水濟命宫火溉丹臺金木交併水土融和姹女乘龍金翁跨虎逆透三關上升内院化爲玉汞下入重樓中有一穴名曰丹臺鉛汞相投水火相合纔若意到即如印圈契約也自然而然不約而合有動之動出於不動有爲之爲出於無爲當是時也白雪漫天黄芽滿地龍吟虎嘯夫唱婦隨玉鼎湯煎金爐火熾雷轟電掣撼動乾坤百脉聳然三關透徹玄珠成象太乙歸眞泥丸風生絳宫月明丹田煙暖穀沼波澄鍊成還丹易如反掌七返九還方成大藥日鍊時烹以至丸轉天關地軸在吾手中經云人能常清凈天地悉皆歸則是三花聚頂五氣朝元可以入衆妙門玄之又玄也更能晝運靈旗夜孕火芝温養聖胎産成赤子至於脫胎神化回陽换骨則是玉符保神金液鍊形形神俱妙與道合眞者也張平叔云都來片餉工夫永保無窮逸樂誠哉是言蓋道之基丹之本龍虎之宗鉛汞之祖三火所聚八水所歸萬神朝會之門金丹妙用之源乃歸根復命之關竅也既能知此則慾不必遣而心自淨心不必澄而神自清一念不生萬幻俱寢身馭扶摇神遊恢漠方知道風清月白皆顯揚鉛汞之機水緑山青盡發露虎龍之㫖海南白玉蟾幻從先師陳泥丸學丹法每到日中冬至之時則開乾閉巽留坤塞艮據天罡持斗柄謁軒轅過扶桑入廣寒面鶉尾舉黄鐘泛海槎登崑崙佩唐符撼天雷遊巫山呼黄童召朱兒取青龍肝白虎髓赤鳳血黑龜精入土釜啓熒惑命閼伯化成丹砂開華池吸神水飲刀圭從無入有無質生質抽鉛添汞結成聖胎十月既滿氣足形圓身外有身謂之胎仙其訣曰用志不分乃可凝神灰心㝠㝠金丹内成此子之所得也如昔施肩吾之詩曰氣是添年藥心爲使氣神能爲神氣主便是得仙人惟此詩簡明通玄玉蟾因閱而誦之自然到秋蟾麗天虛空消殞之地非枯木寒灰之士不能知此子既得此不敢自默太上玄科曰遇人不傳失天道傳非其人泄天寳天涯海角尋遍無人不容輕傳恐受天譴深慮大道無傳丹法湮泯故作玄關顯祕論蓋將曉斯世而詔後學以壽金丹一線之脉也復恐世人猶昧此理乃復爲之言曰以眼視眼以耳聽耳以鼻調鼻以口緘口潜藏飛躍本乎一心先當習定凝神懲忿窒慾懲忿窒慾則水火既濟水火既濟則金木交併金木交併則眞土歸位眞土歸位則金丹自然大如黍米日復一粒神歸氣復充塞天地孟子曰善養吾浩然之氣者此也肝氣全則仁肺氣全則義心氣全則禮腎氣全則智脾氣全則信若受氣不足則不仁不義不禮不智不信豈人也哉人能凝虛養浩心廣體胖氣母既成結丹甚易可不厚其所養以保我之無歟學者思之敬書以授留紫元云海瓊君隱山文玉蟾翁與世絶交而高卧於葛山之巓客或問隱山之㫖何樂乎曰善隱山者不知其隱山之樂知隱山之樂者鳥必擇木魚必擇水也夫山中之人其所樂者不在乎山之樂蓋其心之樂而樂乎山者心境一如也對境無心對心無境斯則隱山之善樂者歟問曰隱山之㫖固如是山中之隱者豈不知山中之味乎曰山中之味山中之樂也隱山者知味乎道而不知味乎山也吾將以耳聞目見者爲子談之客曰唯唯曰隱山者不可以山之樂而移其心不可以心之樂而殢其山山自山也心自心也隱者且不曰古何如人今何如人彼山如是此山如是有如是隱山之人有如是隱山之時又有如是隱山之趣其時也聖賢胥會其人也崇尚道德其趣也修鍊形神也耶吾恐如此知如此見必不逮古人者十常八九焉山中之隱者非曰必林巒而爲山非林巒而不爲山然其人人自有所隱之山也其清虛寂靜高爽深幽者此人之山者山其心也其是非寵辱貧富貴賤者此人之市者市其心也今人以爲大隱居鄽小隱居山者不無意也自名利之習熾以物慾之事攻則厭鬧思靜也自恬適之興滿修進之念冷則嫌靜思鬧也若夫人能以此心自立雖園林之僻者亦此心也市井之喧者亦此心也不必乎逃其心之喧適其心之欲喧不必乎樂其境之勝疾其境之不勝知如是山樂如是心謂之眞隱焉欲隱山者善隱心也無事治心謂之隱有事應迹謂之山無心於山無山於心也是故先須識道後隱於山若未識道而先居山者見其山必忘其道若先識道而後居山者造其道必忘其山忘山則道性怡神忘道則山形蔽目是以忘山見道人間亦寂也見山忘道山中乃喧也法法虛融心心虛寂何城市之可喧何山澤之可靜山靜而心常喧者莫市之若也市喧而心常靜者莫山之若也喧而不喧靜復何靜語默無非山動靜無非市恬淡息於内而不亂蕭散揚人者殆猶魚鳶之飛躍天淵也適其所樂而已矣其樂非耳目之樂而後樂非情識之樂而後樂樂者在心不可以形容不可以知見心之樂者隱者之樂也於山無預也以清凈爲道場以恬退爲法事以安樂爲眷屬不欲與世交不欲與物累其修身也不事乎百骸其養形也不溽乎五味視死之日如生之年執有之物如無之用其安禪也雲溪煙壠其經行也月洞風林有麋鹿以爲朋有松竹以爲鄰有春韭秋菘之富有晨霞晚露之貴語其衣也編草而紐蒲緝茅而綴蕙語其食也炊參而糗苓飯松而飼檜飲石骨之冷泉哺山肝之瞍泥行枯木之前坐古巖之下住深林邃谷之間卧長松幽石之上日則長嘯于泉雲之幽夜則孤眠於煙靄之深其寒暑也心暑乎道而不知夏之暑心寒乎道而不知冬之寒知冬之寒則冰霜洌其膚而不變松栢之容風雪凍其形而不改山石之操知夏之暑亢陽瀝其汗而不生惱熱之心炎火熾其於外而不動逍遥山谷放曠丘鄽遊逸形儀寂靜心腑吾恐市鄽之下聲色闤闠塵勞膠擾五色得以盲吾眼五音得以聾吾耳五慾得以汨吾心始乎入吾之心吾心之所不可入則日以之動摇夜以之傾撼吾心無所守則必徇乎事之所奪任乎物之所營然則山野之間亦如市鄽何也閑花野草可以眩人目幽禽麗雀可以瞶人耳子非隱其心而欲隱於山可乎古先賢哲隱山之意固如是隱山之事則不然世俗趨於利風教溺於欲沉醉乎名利之郷夢寐乎人我之域出生入死而不知貸罪賂福而不覺是聖人之所憂故聖人之所隱也聖人所憂不在乎心之憂而憂其人聖人所隱不在乎山之隱而隱其心故芻狗乎含靈之形而金玉乎含靈之性是非質其形於山之外而亦妙其性於山之内惟聖人知之子欲聞山中之味山中之㫖乎夫山之爲山人之爲人人亦不欲必乎山而後隱山亦不欲必乎人而後存存乎山隱乎步而不起煎煩之念茅廬竹舍草氈松爐不可以爲寒茂林脩竹冷風寒泉不可以爲暑笑傲煙霞偃仰風雨樂人之所不能樂得人之所不可得有葉可書有花可碁其爲琴也風入松其爲酒也雨滴石其寧心有禪其鍊心有行視虎狼如家豚呼熊兕如人僕其孤如寒猿夜號其閑如白雲暮飛不可以朝野拘其心不可以身世穽其志以此修之謂之隱以此隱之謂之山其爲山非世間之所謂山其爲人非世間之所謂人人與山俱化山與人俱忘人也者心也山也者心也其心也者不知孰爲山孰爲人也可知而不可以知知可見而不可以見見純眞沖寂之妙則非山非人也其非山非人之妙如月之在波如風之在竹不可得而言也客曰請事斯語當從先生遊曰子爲誰客曰紫元子也常寂光國記玉蟾翁笑傲乎風月清虛之都住持乎溪山寥落之境朝餐紅霞暮飼紫霧四大怡怡然一性申申然不知春秋之欲寒暑我而日月之欲隂陽我似醉似夢若佯若蹶天無醫雲晨曦眩目俄而竹洞風冷烏雲閟彩微雨清塵山昏水暮鳥飛魚伏未幾隂靄朗霽天氣可人温然如春凄然如秋彩雲翔碧霄之南中有人焉冠逍遥自然之冠履如理實際之履衣虛無湛寂之衣食禪悅法喜之食十目不可睹其形四聰不可聞其聲須彌廬山不能高其身薩婆若海不能廣其意其步趍也白雲流水其語默也翠竹黄花已而有言曰我無位眞人也子知之乎世尊與螻蟻共胎兜率洎鐵圍同境子可罷司聽之臣黜職視之吏可以形影相弔於無隂陽地翁諾犬塊其心枯木其形乃與眞人會恍若曾邂逅契若未交處眞人與翁仗一切無念之杖張大用現前之蓋且行且憩罔測晝夜約十萬八千餘里始乎歷五藴之山泛六欲之海離無明之郷出貪嗔之域忽之一方眞人曰此大慧明天常寂光國戒州禪那縣無何有郷涅槃里也眞人乃是國之君眞人之居心空之殿解脫之樓眞如之亭寂滅之臺圓覺之宫眞觀之堂其國地無塵泥天不晦顯國中君臣父子聖凡含識同形同相無姓無名其莊嚴不可稱其受用不可量眞人擁五明之輅駕七寳之輿闢虛凈光明之藏竪神通自在之幢翁與眞人遊乎知見峯之下有幽玄洞慈忍江功德林四睇久之涉菩提之園無相之圃八還苑囿四處垣墉巡三摩之林步四諦之山眞人欲還乘般若船渡平等海不彈指間徃復無際眞人揖翁宴坐于清凈之軒敞六通户牖嚴萬化堦庭焚五分之香獻六味之饌薦八自在之茗酌八功德之泉呈五眼之珠示一眞之印設作止任滅之綱燭見聞知覺之燈眞人俄而隱翁回首遂失其所在翁愕然有省焕然有失告諸天人彼眞人者媲我形類我志我非寤寐我非酗酩我寧遺其所眞執其所妄乎乃喟然長吁曰吾即眞人也眞人即吾也吾將逝矣乃命管城先生墨松使者令陶泓白起等記紫元子書金液大還丹賦學道之士必修金丹身木欲槁心灰已寒願飛昇於玉闕必修鍊於金丹乾馬坤牛衛丁公於神室坎烏離兔媒姹女於眞壇絳闕散郎清朝閑士使扶桑青龍奮翅出火而華嶽白虎飛牙入水天爐地鼎三關造化之樞機月魄日魂一掬隂陽之精髓鉛裏藏土汞中産金龜乃子爻蛇乃午象兔爲卯畜雞爲酉禽四象五行不離乎戊三元八卦當資厥壬朝既屯暮既蒙六爻有象夜必復晝必姤萬物無心由是三性會合攢簇元宫二氣升降盤旋黄道惟一味水銀纔變黑玉故七返朱砂乃成紅寳珠橘瓊榴交梨火棗普天白雪翩翻紫府之清飈滿院黄花隱映丹田之瑞草吾知夫抽添何物採取何地生殺有户缺圓有時以浮沉爲清濁之本以間隔明動靜之基養正以抱一持盈而守雌舉世無人能達此者終日兀坐不知所之恩生害害生恩房躔見昴主中賔賔中主斗度回箕嘗謂大道無言内丹非術玄珠垂象而隂裏抱陽德嬰兒結胎而雄中含雌質君臣之間先後悔吝夫婦之外存亡凶吉丁位之心癸位之張甲宫之女庚宫之畢刑德生旺雖有否泰沐浴潜藏初無固必藥材斤兩東西南北以歸中火候城池二八九三而爲一如是則烏極河車百刻上運華池神水四時逆流榮衛寒温而鶉火鬼井精神衰旺而玄枵斗牛子母亟蓋身化心化兄弟塤箎福修慧修六畫動爻見晦朔望弦之變二至改度有蝗蟲水旱之憂眞人宇宙妙縱横溪山歸掌握左軍右軍自古仁義大隱小隱從今宫角風悄悄月娟娟片雲孤鶴而長嘯一聲編書以遺後學金液大還丹詩烏兔乾坤鼎龜蛇復姤壇世間無事客心内大還丹白虎水中吼青龍火裏蟠汞鉛泥蘂艷金木雪花寒離坎非心腎東西不肺肝三句窮七返九轉出泥丸道閫元樞歌君不見一粒金丹何赫赤大如彈丸色如橘人人分上本圓成夜夜靈光滿神室神室即是此靈臺中有長生不死胎元君謂之偃月爐爐中藥物象三台來時一父對一母到後三男及三女朝屯暮蒙有君臣盡姤夜復分賔主青衣姹女騎青龍却將白虎與金翁三花爛熳神霄府雙鶴徘徊太一宫都來金木水火土幾多生老病死苦但教仁義禮智信自然宫商角徵羽自子至巳震兊乾自午至亥巽艮坤坎離本是交會宫卯酉乃其出入門房虛昴星直四季二分二至有啓閉若觀混沌未分前思量造化眞兒戲誰知金液大還丹只在當人日用間爲君說破修丹㫖鬧非城市靜非山丹頭本自生前結眞凈妙明光皎潔在外即非砂與琉在内即非精與血火藥元來一處居看時似有覓時無教君終日默如愚鍊成一顆如意珠大冶眞金色不變爭奈塵埃尋不見生來死去幾萬遍所以如今用修鍊分明一未水中金但向華池着意尋八兩金兮八兩水一物浮兮一物沉攢簇五行在庚甲四象五行要和合夜半金烏入廣寒白如酥兮黄如蠟金精木液本虛無嫩時須採老時枯熾則坤火略埋藏冷則巽風爲吹噓定裏一靜而一動靜中一照而一用風吹楊柳是眞鉛雨洗桃花是眞汞三關軋軋紫河車九鼎燦燦黄金砂紫府烏龜餐白雪丹田朱鳳啄黄芽地下海潮天上月以此消長應圓缺此則抽添進退機便是虛空造化骨水源清濁要須知相生相剋有幽微奪得天機大造功年中之月日中時及至打教成一塊試問時人會不會不增不減何抽添無去無來何進退盈虧衰旺自有時刑德臨門有偶竒若到丹成須沐浴守城野戰要防危温養嬰兒惟藉母七返九還須識主一爻剛兮一爻柔一候文兮一候武片餉工夫鍊得成一年火候始胎嬰九遡九回爲九轉雷聲震動鬼神驚鍊丹工夫只十月漸採漸鍊漸凝結三年九載方老成子子孫孫千百億昔日因看龍虎經於中龍虎轉難明歌詩契論都尋遍到底金丹學未成嘉定丁丑春三月有一道人蓬其髮授我袖中一卷書讀之字字金丹訣道人去後杳難逢北海蒼梧有底蹤貌其形狀以問人人言此是白蟾翁堪嗟世上學仙者泥象執文皆認假豈知一物常相隨圓陁陁兮赤灑灑得訣歸來試鍊看龍爭虎戰片時間九華天上人知得一夜風雷撼萬山儂家本住螺江上明月清風無盡藏等閑作此大道歌要與時人爲榜樣未說修丹便得仙且圖形固得延年那堪或有沖昇分渺渺白鶴登青天海瓊問道集
