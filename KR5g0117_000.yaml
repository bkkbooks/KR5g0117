front:
  text: 海瓊問道集序并五讀韓昌黎桃源之句則起神仙渺茫之念讀白居易海山之辭則起兜率歸去之思人心無根隨語生智噫吾聞之神仙可以學得不死可以力致非曰能之願學焉幼時業愛修仙鞭心于兹不覺壬子又丁丑矣人間歲月如許頭顱皮袋又安以頓哉天貸其逢而於道有可聞之漸是年春遭遇眞師海瓊君姓白諱玉蟾或云海南人疑其家於襄沔也時又蓬髮赤足以人廛市時又青巾野服以遊宫觀浮湛俗間人莫識也自云二十有一矣三教之書靡所不究每與客語覺其典故若泉湧然若當世飽學者未能也眞草篆隸心匠妙明琴棋書畫間或翫世所與交者盡時髦世彦雖敬慕之者不可得親隨身無片紙落筆滿四方踏遍江湖名滿天下其從之如毛也時人多見其囊中曾不蓄銖銅粒黍以自備或醉甚輒呼雷或睡熟能飛章或喜或怒或笑或哭狀如不慧或亦出言與休咎合觀其濟世利人之念汲汲也徹夜燒燭以坐鎮日拍攔以歌晨亦不沐晝亦不炊經年置水火於無用稱其耳瞶目眵或對客以牙宣爲辭未審厥㫖也無酒亦醉睡醒亦昏諸方士夫刊其文碑其言多矣今多嗔少懽與世甚相違故慕之而針芥歟荷相授以九鼎金鉛砂汞之書太乙刀圭火符金液之訣紫霄嘯命風霆之文元長自惟曩者獲罪於天失身墮世何以得此誓糜軀以修之焉期不負所學矣謹集間酬警悟之一二以鋟諸木使四海同志之士有所啓發也白君得之於陳泥丸陳得於薛道光薛得於石泰石得於張平叔張得於劉海蟾劉得於吕洞賔況人皆知其爲人而讀其書也吾何贅以叙哉紫元子留元長稽首再拜序海瓊問道集
